spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/spring
    username: root
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true
    show-sql: true

  servlet:
    multipart:
      max-request-size: 10MB
      max-file-size: 1MB

  cache:
    type: simple