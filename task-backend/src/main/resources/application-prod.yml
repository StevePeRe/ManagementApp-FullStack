spring:
  servlet:
    multipart:
      max-request-size: 20MB
      max-file-size: 10MB
  cache:
    type: simple

  datasource:
    url: jdbc:h2:file:~/tiendadb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
