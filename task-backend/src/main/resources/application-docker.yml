spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/spring
    username: root
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  servlet:
    multipart:
      max-request-size: 10MB
      max-file-size: 1MB

  cache:
    type: simple

spring.ai.ollama.base-url: http://host.docker.internal:11434
spring.ai.ollama.chat.options.model: llama3.2
spring.ai.ollama.chat.options.temperature: 0.1
spring.ai.fallback.enabled: true
spring.ai.timeout-seconds: 30

security:
  jwt:
    secret-key: 4f7e9a2b5c8d1e3f6a9b2c5d8e1f4a7b0c3d6e9f2a5b8c1d4e7f0a3b6c9d2e5f8
    expiration: 86400000
